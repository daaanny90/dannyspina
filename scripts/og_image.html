<!doctype html>
<!-- Source of static/og-default.png. Re-render with:
     /Applications/Firefox.app/Contents/MacOS/firefox --headless \
       --window-size=1200,630 \
       --screenshot "$PWD/static/og-default.png" \
       "file://$PWD/scripts/og_image.html"
     Any headless browser works, the point is a 1200x630 viewport. Firefox is
     used because headless Chromium/Brave does not exit on --screenshot here. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=JetBrains+Mono:wght@500&display=block"
      rel="stylesheet"
    />
    <style>
      /* mirrors src/lib/styles/tokens.css — the card must read as the site */
      :root {
        --bg: #26221c;
        --ink: #ede7da;
        --ink-muted: #a79e8d;
        --brass: #c99b3f;
        --grid: rgba(237, 231, 218, 0.03);
        --grid-major: rgba(237, 231, 218, 0.055);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background-color: var(--bg);
        background-image:
          repeating-linear-gradient(
            to right,
            var(--grid) 0,
            var(--grid) 1px,
            transparent 1px,
            transparent 8px
          ),
          repeating-linear-gradient(
            to bottom,
            var(--grid) 0,
            var(--grid) 1px,
            transparent 1px,
            transparent 8px
          ),
          repeating-linear-gradient(
            to right,
            var(--grid-major) 0,
            var(--grid-major) 1px,
            transparent 1px,
            transparent 40px
          ),
          repeating-linear-gradient(
            to bottom,
            var(--grid-major) 0,
            var(--grid-major) 1px,
            transparent 1px,
            transparent 40px
          );
        color: var(--ink);
        font-family: "Archivo", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 64px 72px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 17px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--brass);
      }

      .label.faint {
        color: var(--ink-muted);
      }

      h1 {
        font-size: 84px;
        font-weight: 800;
        line-height: 1.03;
        letter-spacing: -0.025em;
        max-width: 15ch;
      }

      .lead {
        margin-top: 22px;
        font-size: 25px;
        font-weight: 400;
        color: var(--ink-muted);
        max-width: 34ch;
      }

      .rule {
        height: 1px;
        background: rgba(237, 231, 218, 0.35);
        margin-bottom: 22px;
      }

      .mark {
        position: absolute;
        top: 56px;
        right: 72px;
        width: 116px;
        height: 116px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>

    </svg>

    <p class="label">dannyspina.com</p>

    <div>
      <h1>Software that stays serviceable.</h1>
      <p class="lead">
        Frontend, design systems and design ops &mdash; built to outlive the
        sprint that shipped them.
      </p>
    </div>

    <div>
      <div class="rule"></div>
      <div class="row">
        <p class="label faint">Danny Spina &middot; software developer (web)</p>
        <p class="label faint">Parma, Italy</p>
      </div>
    </div>
  </body>
</html>
