<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta property="og:type" content="website" />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.svg"
      type="image/svg+xml"
    />
    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.png"
      sizes="96x96"
      type="image/png"
    />
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/apple-touch-icon.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
    <!-- Pixel Code for https://app.tinyanalytics.io/ -->
    <script
      defer
      src="https://app.tinyanalytics.io/pixel/DpCTArdREqK4n60g"
    ></script>
    <!-- END Pixel Code -->
  </head>
  <body data-sveltekit-preload-code="viewport" data-sveltekit-noscroll>
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      const themeSettings = localStorage.getItem("theme") ?? "dark";
      document.documentElement.dataset.theme = themeSettings;
    </script>
  </body>
</html>
